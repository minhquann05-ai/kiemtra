<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân Tích Số - Đồng Bộ Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; margin-top: 0; }
        
        textarea { width: 100%; height: 180px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; padding: 12px; box-sizing: border-box; font-size: 15px; }
        
        .status-sync { text-align: center; font-size: 12px; color: #666; margin-bottom: 10px; }
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        button { flex: 1; min-width: 120px; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .btn-analyze { background-color: #1a73e8; color: white; }
        .btn-paste { background-color: #34a853; color: white; }
        .btn-clear { background-color: #ea4335; color: white; }

        .result { display: none; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card h3 { margin-top: 0; font-size: 0.95rem; color: #5f6368; border-bottom: 2px solid #f1f3f4; padding-bottom: 8px; }
        .highlight { font-size: 1.2rem; font-weight: bold; color: #1a73e8; }
        .grid-list { font-family: monospace; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Phân Tích & Đồng Bộ</h2>
    <div id="syncStatus" class="status-sync">Đang kiểm tra kết nối Firebase...</div>
    
    <textarea id="inputData" placeholder="Dán dãy số vào đây... Dữ liệu sẽ tự động lưu lên đám mây."></textarea>
    
    <div class="button-group">
        <button class="btn-paste" onclick="pasteData()">📋 Dán & Lưu</button>
        <button class="btn-analyze" onclick="analyzeNumbers()">🚀 Phân tích</button>
        <button class="btn-clear" onclick="clearAll()">🗑️ Xóa hết</button>
    </div>

    <div id="output" class="result">
        <div class="card">
            <h3>Tổng số</h3>
            <p id="totalCount" class="highlight">0</p>
        </div>
        <div class="card">
            <h3>Chẵn - Lẻ</h3>
            <p>Chẵn: <span id="evenCount" class="highlight">0</span></p>
            <p>Lẻ: <span id="oddCount" class="highlight">0</span></p>
        </div>
        <div class="card">
            <h3>To - Nhỏ (50)</h3>
            <p>To: <span id="bigCount" class="highlight">0</span></p>
            <p>Nhỏ: <span id="smallCount" class="highlight">0</span></p>
        </div>
        <div class="card">
            <h3>Đầu</h3>
            <div id="headStats" class="grid-list"></div>
        </div>
        <div class="card">
            <h3>Đuôi</h3>
            <div id="tailStats" class="grid-list"></div>
        </div>
    </div>
</div>

<script>
// --- CẤU HÌNH FIREBASE (DÙNG CHUNG CỦA BẠN) ---
const firebaseConfig = {
    apiKey: "AIzaSyD-tbxT6acKrTgAqNxHyDZHW2gD06KX1CI",
    authDomain: "my-work-a159e.firebaseapp.com",
    projectId: "my-work-a159e",
    storageBucket: "my-work-a159e.firebasestorage.app",
    messagingSenderId: "69318636254",
    appId: "1:69318636254:web:35a4a497ee50e6c718484f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
// Tạo một document riêng để không lẫn với web kia
const docRef = db.collection("app_analysis").doc('current_data');

const inputArea = document.getElementById('inputData');
const syncStatus = document.getElementById('syncStatus');

// --- HÀM LƯU DỮ LIỆU LÊN FIREBASE ---
async function saveToFirebase(content) {
    syncStatus.innerText = "☁️ Đang lưu...";
    try {
        await docRef.set({ text: content, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
        syncStatus.innerText = "✅ Đã đồng bộ";
    } catch (e) {
        syncStatus.innerText = "❌ Lỗi đồng bộ";
        console.error(e);
    }
}

// Tự động lưu khi gõ (giống web cũ của bạn)
let typingTimer;
inputArea.oninput = () => {
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {
        saveToFirebase(inputArea.value);
        analyzeNumbers(); // Tự động phân tích luôn khi gõ xong
    }, 1000);
};

// --- HÀM TẢI DỮ LIỆU KHI MỞ WEB ---
async function loadData() {
    syncStatus.innerText = "📂 Đang tải dữ liệu cũ...";
    try {
        const doc = await docRef.get();
        if (doc.exists) {
            inputArea.value = doc.data().text || "";
            syncStatus.innerText = "✅ Tải dữ liệu thành công";
            analyzeNumbers();
        } else {
            syncStatus.innerText = "🆕 Sẵn sàng (Chưa có dữ liệu)";
        }
    } catch (e) {
        syncStatus.innerText = "❌ Không thể tải dữ liệu";
    }
}

// --- CÁC HÀM LOGIC ---
async function pasteData() {
    try {
        const text = await navigator.clipboard.readText();
        inputArea.value = text;
        saveToFirebase(text);
        analyzeNumbers();
    } catch (err) { alert("Hãy dùng Ctrl+V để dán."); }
}

function clearAll() {
    if(confirm("Bạn có chắc chắn muốn xóa sạch dữ liệu trên mọi thiết bị?")) {
        inputArea.value = '';
        saveToFirebase('');
        document.getElementById('output').style.display = 'none';
    }
}

function analyzeNumbers() {
    const text = inputArea.value;
    const numbers = text.match(/\d{2}/g) || [];
    if (numbers.length === 0) {
        document.getElementById('output').style.display = 'none';
        return;
    }

    let even = 0, odd = 0, big = 0, small = 0;
    let heads = {}, tails = {};

    numbers.forEach(numStr => {
        const n = parseInt(numStr);
        const h = numStr[0]; 
        const t = numStr[1];
        if (n % 2 === 0) even++; else odd++;
        if (n >= 50) big++; else small++;
        heads[h] = (heads[h] || 0) + 1;
        tails[t] = (tails[t] || 0) + 1;
    });

    document.getElementById('output').style.display = 'grid';
    document.getElementById('totalCount').innerText = numbers.length;
    document.getElementById('evenCount').innerText = even;
    document.getElementById('oddCount').innerText = odd;
    document.getElementById('bigCount').innerText = big;
    document.getElementById('smallCount').innerText = small;

    let hHtml = '', tHtml = '';
    for(let i=0; i<=9; i++) {
        if(heads[i]) hHtml += `Đầu ${i}: <b>${heads[i]}</b><br>`;
        if(tails[i]) tHtml += `Đuôi ${i}: <b>${tails[i]}</b><br>`;
    }
    document.getElementById('headStats').innerHTML = hHtml || '...';
    document.getElementById('tailStats').innerHTML = tHtml || '...';
}

// Chạy tải dữ liệu khi vừa mở trang
loadData();

</script>
</body>
</html>
