<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân Tích Số - One Click</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; margin-top: 0; text-transform: uppercase; font-size: 20px; letter-spacing: 1px; }
        
        textarea { width: 100%; height: 180px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; padding: 12px; box-sizing: border-box; font-size: 15px; transition: border-color 0.3s; }
        textarea:focus { border-color: #1a73e8; outline: none; }
        
        .status-sync { text-align: center; font-size: 12px; color: #666; margin-bottom: 10px; font-style: italic; min-height: 18px; }
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        button { flex: 1; min-width: 120px; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s; font-size: 14px; }
        button:active { transform: scale(0.95); }
        
        .btn-paste { background-color: #34a853; color: white; flex: 2; font-size: 16px; } /* Nút dán to hơn để dễ bấm */
        .btn-clear { background-color: #ea4335; color: white; }

        .result { display: none; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-top: 4px solid #1a73e8; }
        .card h3 { margin: 0 0 10px 0; font-size: 0.9rem; color: #5f6368; text-transform: uppercase; }
        .highlight { font-size: 1.4rem; font-weight: 800; color: #1a73e8; font-family: 'Courier New', Courier, monospace; }
        .grid-list { font-family: monospace; font-size: 0.95rem; line-height: 1.6; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>Phân Tích & Đồng Bộ</h2>
    <div id="syncStatus" class="status-sync">Đang kết nối Firebase...</div>
    
    <textarea id="inputData" placeholder="Dữ liệu sẽ tự động phân tích khi bạn dán hoặc nhập..."></textarea>
    
    <div class="button-group">
        <button class="btn-paste" onclick="pasteAndAnalyze()">📋 DÁN & PHÂN TÍCH LUÔN</button>
        <button class="btn-clear" onclick="clearAll()">🗑️ XÓA HẾT</button>
    </div>

    <div id="output" class="result">
        <div class="card">
            <h3></h3>
            <p id="totalCount" class="highlight">0</p>
        </div>
        <div class="card">
            <h3></h3>
            <p>2: <span id="evenCount" class="highlight">0</span></p>
            <p>1: <span id="oddCount" class="highlight">0</span></p>
        </div>
        <div class="card">
            <h3></h3>
            <p>4: <span id="bigCount" class="highlight">0</span></p>
            <p>3: <span id="smallCount" class="highlight">0</span></p>
        </div>
        <div class="card">
            <h3></h3>
            <div id="headStats" class="grid-list"></div>
        </div>
        <div class="card">
            <h3></h3>
            <div id="tailStats" class="grid-list"></div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyD-tbxT6acKrTgAqNxHyDZHW2gD06KX1CI",
    authDomain: "my-work-a159e.firebaseapp.com",
    projectId: "my-work-a159e",
    storageBucket: "my-work-a159e.firebasestorage.app",
    messagingSenderId: "69318636254",
    appId: "1:69318636254:web:35a4a497ee50e6c718484f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const docRef = db.collection("app_analysis").doc('current_data');

const inputArea = document.getElementById('inputData');
const syncStatus = document.getElementById('syncStatus');

// Lưu Firebase
async function saveToFirebase(content) {
    syncStatus.innerText = "☁️ Đang lưu...";
    try {
        await docRef.set({ text: content, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
        syncStatus.innerText = "✅ Đã đồng bộ";
    } catch (e) { syncStatus.innerText = "❌ Lỗi lưu"; }
}

// Tự động phân tích khi gõ tay
let typingTimer;
inputArea.oninput = () => {
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {
        saveToFirebase(inputArea.value);
        analyzeNumbers();
    }, 500);
};

// Tải dữ liệu ban đầu
async function loadData() {
    try {
        const doc = await docRef.get();
        if (doc.exists) {
            inputArea.value = doc.data().text || "";
            syncStatus.innerText = "✅ Đã tải dữ liệu";
            analyzeNumbers();
        }
    } catch (e) { syncStatus.innerText = "❌ Lỗi kết nối"; }
}

// --- HÀM QUAN TRỌNG: BẤM 1 LẦN DÁN VÀ CHẠY LUÔN ---
async function pasteAndAnalyze() {
    try {
        const text = await navigator.clipboard.readText();
        inputArea.value = text;
        // Chạy cùng lúc 2 việc: Lưu lên mạng và Phân tích ra màn hình
        saveToFirebase(text);
        analyzeNumbers();
    } catch (err) {
        alert("Không thể truy cập bộ nhớ tạm. Hãy dùng phím tắt Ctrl+V.");
    }
}

function clearAll() {
    inputArea.value = '';
    saveToFirebase('');
    document.getElementById('output').style.display = 'none';
    syncStatus.innerText = "🗑️ Đã xóa sạch";
}

function analyzeNumbers() {
    const text = inputArea.value;
    const numbers = text.match(/\d{2}/g) || [];
    if (numbers.length === 0) {
        document.getElementById('output').style.display = 'none';
        return;
    }

    let even = 0, odd = 0, big = 0, small = 0;
    let heads = {}, tails = {};

    numbers.forEach(numStr => {
        const n = parseInt(numStr);
        const h = numStr[0]; 
        const t = numStr[1];
        if (n % 2 === 0) even++; else odd++;
        if (n >= 50) big++; else small++;
        heads[h] = (heads[h] || 0) + 1;
        tails[t] = (tails[t] || 0) + 1;
    });

    document.getElementById('output').style.display = 'grid';
    document.getElementById('totalCount').innerText = numbers.length + " số";
    document.getElementById('evenCount').innerText = even;
    document.getElementById('oddCount').innerText = odd;
    document.getElementById('bigCount').innerText = big;
    document.getElementById('smallCount').innerText = small;

    let hHtml = '', tHtml = '';
    for(let i=0; i<=9; i++) {
        if(heads[i]) hHtml += `ầ ${i}: <b>${heads[i]}</b><br>`;
        if(tails[i]) tHtml += `uô ${i}: <b>${tails[i]}</b><br>`;
    }
    document.getElementById('headStats').innerHTML = hHtml || 'Trống';
    document.getElementById('tailStats').innerHTML = tHtml || 'Trống';
}

loadData();
</script>
</body>
</html>
