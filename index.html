<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ Phân tích Dãy số v2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; line-height: 1.6; background-color: #f0f2f5; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; }
        textarea { width: 100%; height: 180px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; padding: 12px; box-sizing: border-box; font-size: 15px; transition: border-color 0.3s; }
        textarea:focus { border-color: #1a73e8; outline: none; }
        
        .button-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        button { flex: 1; min-width: 120px; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: opacity 0.2s; }
        
        .btn-analyze { background-color: #1a73e8; color: white; }
        .btn-paste { background-color: #34a853; color: white; }
        .btn-clear { background-color: #ea4335; color: white; }
        button:hover { opacity: 0.9; }

        .result { display: none; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .card { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card h3 { margin-top: 0; font-size: 0.95rem; color: #5f6368; border-bottom: 2px solid #f1f3f4; padding-bottom: 8px; margin-bottom: 12px; }
        .highlight { font-size: 1.2rem; font-weight: bold; color: #1a73e8; }
        .grid-list { font-family: monospace; font-size: 0.9rem; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <h2>Phân tích Số liệu Thông minh</h2>
    
    <textarea id="inputData" placeholder="Dán dãy số của bạn tại đây... (Ví dụ: Đầu 0: 01 02 03)"></textarea>
    
    <div class="button-group">
        <button class="btn-paste" onclick="pasteData()">📋 Dán dữ liệu</button>
        <button class="btn-analyze" onclick="analyzeNumbers()">🚀 Phân tích ngay</button>
        <button class="btn-clear" onclick="clearAll()">🗑️ Xóa dữ liệu</button>
    </div>

    <div id="output" class="result">
        <div class="card">
            <h3>SL</h3>
            <p id="totalCount" class="highlight">0</p>
        </div>
        <div class="card">
            <h3>2-1</h3>
            <p>Chẵn: <span id="evenCount" class="highlight">0</span></p>
            <p>Lẻ: <span id="oddCount" class="highlight">0</span></p>
        </div>
        <div class="card">
            <h3>4-3(50)</h3>
            <p>To: <span id="bigCount" class="highlight">0</span></p>
            <p>Nhỏ: <span id="smallCount" class="highlight">0</span></p>
        </div>
        <div class="card">
            <h3>ầu</h3>
            <div id="headStats" class="grid-list"></div>
        </div>
        <div class="card">
            <h3>uôi</h3>
            <div id="tailStats" class="grid-list"></div>
        </div>
    </div>
</div>

<script>
// Hàm Dán dữ liệu từ Clipboard
async function pasteData() {
    try {
        const text = await navigator.clipboard.readText();
        document.getElementById('inputData').value = text;
    } catch (err) {
        alert("Trình duyệt không cho phép truy cập Clipboard. Hãy dùng Ctrl+V.");
    }
}

// Hàm Xóa dữ liệu
function clearAll() {
    document.getElementById('inputData').value = '';
    document.getElementById('output').style.display = 'none';
}

// Hàm Phân tích
function analyzeNumbers() {
    const text = document.getElementById('inputData').value;
    const numbers = text.match(/\d{2}/g) || [];
    
    if (numbers.length === 0) {
        alert("Vui lòng nhập hoặc dán dãy số có 2 chữ số!");
        return;
    }

    let even = 0, odd = 0, big = 0, small = 0;
    let heads = {}, tails = {};

    numbers.forEach(numStr => {
        const n = parseInt(numStr);
        const h = numStr[0]; 
        const t = numStr[1];

        if (n % 2 === 0) even++; else odd++;
        if (n >= 50) big++; else small++;

        heads[h] = (heads[h] || 0) + 1;
        tails[t] = (tails[t] || 0) + 1;
    });

    document.getElementById('output').style.display = 'grid';
    document.getElementById('totalCount').innerText = numbers.length + " số";
    document.getElementById('evenCount').innerText = even;
    document.getElementById('oddCount').innerText = odd;
    document.getElementById('bigCount').innerText = big;
    document.getElementById('smallCount').innerText = small;

    let headHtml = '', tailHtml = '';
    for(let i=0; i<=9; i++) {
        if(heads[i]) headHtml += `Đầu ${i}: <b>${heads[i]}</b><br>`;
        if(tails[i]) tailHtml += `Đuôi ${i}: <b>${tails[i]}</b><br>`;
    }
    document.getElementById('headStats').innerHTML = headHtml || 'Trống';
    document.getElementById('tailStats').innerHTML = tailHtml || 'Trống';
}
</script>

</body>
</html>
